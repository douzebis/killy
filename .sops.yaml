creation_rules:
  - path_regex: killy/install-config\.yaml$
    encrypted_regex: ^(acme_creds|dns_creds|s3_creds|mail_creds|mail\.private|wifi_key|host_private_key|laptop_private_key|hashed_password)$
    age:
      # killy host key (derived from SSH host ed25519 key via ssh-to-age)
      # — replaced on each reinstall via `sops updatekeys`
      - age12u48wxqsn3szg3sr6694m7cvl7xsryawn5jrwyx6f0ffefr4ugps8763ys
      # operator key (~/.config/sops/age/keys.txt on build host)
      # — derived from build host SSH key via ssh-to-age
      - age10tw9w9wce66sc4xu8nt9l6kg5222aede5mry7guk3p67ulmat40sljdu7t
      # install key (Yubikey serial 17688887, PIV slot RETIRED1/0x82, CN=killy-install-key)
      # — unwrapped via yk-unwrap.py --hostname killy, no PIN required
      # — wrapped key stored at killy/wrapped-install-key.bin
      - age1480a4z8vlm5ah8cgjfed0g3mlqlp4wxd2mgvf3ujmnsxzp86l4ss6v6hh6

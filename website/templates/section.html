<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ section.title }} — {{ config.title }}</title>
    <style>
        body { font-family: sans-serif; max-width: 860px; margin: 2em auto; padding: 0 1em; color: #222; }
        h1, h2, h3 { color: #111; }
        a { color: #0366d6; }
        pre { background: #f6f8fa; padding: 1em; border-radius: 4px; overflow-x: auto; }
        code { background: #f6f8fa; padding: .15em .3em; border-radius: 3px; }
        pre code { background: none; padding: 0; }
        nav { margin-bottom: 2em; font-size: .9em; }
    </style>
</head>
<body>
    <nav><a href="{{ config.base_url }}">← killy docs</a></nav>
    {{ section.content | safe }}
    <ul>
    {% for page in section.pages %}
        <li><a href="{{ page.permalink }}">{{ page.title }}</a></li>
    {% endfor %}
    </ul>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.title }}</title>
    <style>
        body { font-family: sans-serif; max-width: 860px; margin: 2em auto; padding: 0 1em; color: #222; }
        h1, h2, h3 { color: #111; }
        a { color: #0366d6; }
        pre { background: #f6f8fa; padding: 1em; border-radius: 4px; overflow-x: auto; }
        code { background: #f6f8fa; padding: .15em .3em; border-radius: 3px; }
        pre code { background: none; padding: 0; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: .5em .75em; }
        th { background: #f6f8fa; }
        hr { border: none; border-top: 1px solid #eee; margin: 2em 0; }
    </style>
</head>
<body>
    {{ section.content | safe }}
</body>
</html>

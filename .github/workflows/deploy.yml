name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.19.2

      - name: Copy docs into website/content
        run: |
          set -e
          # Copy top-level docs (excluding specs/ subdir)
          for f in docs/*.md; do
            name=$(basename "$f" .md)
            dst="website/content/${name}.md"
            # Extract first # heading as title, fall back to filename
            title=$(grep -m1 '^# ' "$f" | sed 's/^# //' || echo "$name")
            printf '+++\ntitle = "%s"\n+++\n\n' "$title" > "$dst"
            cat "$f" >> "$dst"
          done
          # Copy specs/
          mkdir -p website/content/specs
          for f in docs/specs/*.md; do
            name=$(basename "$f" .md)
            dst="website/content/specs/${name}.md"
            title=$(grep -m1 '^# ' "$f" | sed 's/^# //' || echo "$name")
            printf '+++\ntitle = "%s"\n+++\n\n' "$title" > "$dst"
            cat "$f" >> "$dst"
          done

      - name: Build
        run: cd website && zola build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
